<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
</head>
<body>
    <div class="site-wrapper">
        {% include header.html %}
        
        <main class="main-content">
            {{ content }}
        </main>

        {% include footer.html %}
    </div>

<div class="scroll-nav">
    <button onclick="scrollToTop()" id="scrollTopBtn" title="Наверх">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </button>
    <button onclick="scrollToBottom()" id="scrollBottomBtn" title="Вниз">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>
</div>
    
<script src="{{ '/assets/js/copy-code.js' | relative_url }}"></script>
<script src="{{ '/assets/js/scroll.js' | relative_url }}"></script>
</body>
</html>
