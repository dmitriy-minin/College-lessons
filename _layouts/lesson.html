---
layout: default
---
<div class="container">
    {% if page.collection == 'python_lessons' %}
        <a href="{{ '/python.html' | relative_url }}" class="back-btn">← Назад к списку</a>
    {% elsif page.collection == 'php_lessons' %}
        <a href="{{ '/php.html' | relative_url }}" class="back-btn">← Назад к списку</a>
    {% else %}
        <a href="{{ '/' | relative_url }}" class="back-btn">← На главную</a>
    {% endif %}

    <div class="lesson-content-wrapper">
        <h1>{{ page.title }}</h1>
        <div class="lesson-body">
            {{ content }}
        </div>
    </div>
</div>
